<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI Job Hunter</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 250px;
      padding: 15px;
      background-color: #1e1e1e;
      color: #fff;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      color: #00ff88;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }
    .status-container {
      margin: 15px 0;
      padding: 10px;
      background: #2d2d2d;
      border-radius: 5px;
    }
    .label {
      font-size: 12px;
      color: #aaa;
    }
    .value {
      font-size: 13px;
      margin-top: 5px;
      word-break: break-all;
    }
    .btn {
      width: 100%;
      padding: 8px;
      background: #0073b1; /* LinkedIn Blue */
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn:hover {
      background: #005582;
    }
    .success { color: #00ff88; }
    .error { color: #ff5555; }
  </style>
</head>
<body>
  <h2>🤖 Job Hunter SaaS</h2>
  
  <div class="status-container">
    <div class="label">Last Sync Status:</div>
    <div id="status" class="value">Checking...</div>
  </div>

  <div class="status-container">
    <div class="label">Last Sync Time:</div>
    <div id="time" class="value">Never</div>
  </div>

  <button id="syncBtn" class="btn">Force Sync Now</button>

  <script src="popup.js"></script>
</body>
</html>
