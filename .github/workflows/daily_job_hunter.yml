name: Daily Job & Scholarship Hunter

on:
  schedule:
    # Ejecuta a las 11:00 UTC (06:00 AM Ecuador)
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  run-hunter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Job Hunter Bot
        run: python job_hunter.py

      - name: Commit and push reports
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reportes/ OPORTUNIDADES_HOY.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "💸 Nuevas oportunidades de empleo encontradas" && git push)
