name: 🤖 AI Job Hunter V5 — Jobs + Becas + Telegram

on:
  schedule:
    - cron: '0 12 * * *'   # 7am Ecuador
    - cron: '0 17 * * *'   # 12pm Ecuador
    - cron: '0 22 * * *'   # 5pm Ecuador
    - cron: '0 3 * * *'    # 10pm Ecuador
  workflow_dispatch:

jobs:
  job_hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🐍 Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml

    - name: 📁 Prepare directories
      run: mkdir -p reportes data

    - name: 🔍 Run Job Hunter
      run: python job_hunter.py

    - name: 💾 Commit results
      run: |
        git config user.email "bot@github-actions.com"
        git config user.name "AI Job Hunter Bot"
        git add OPORTUNIDADES_HOY.md reportes/ || true
        git diff --staged --quiet || git commit -m "🤖 [Bot] Reporte $(date +'%Y-%m-%d %H:%M') — Job Hunt"
        git push || true
