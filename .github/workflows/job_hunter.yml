name: 🤖 AI Job Hunter V5 — Jobs + Becas + Telegram

on:
  schedule:
    # 4 ciclos al dia: 7am, 12pm, 5pm, 10pm hora Ecuador (UTC-5)
    - cron: '0 12 * * *'   # 7am Ecuador
    - cron: '0 17 * * *'   # 12pm Ecuador
    - cron: '0 22 * * *'   # 5pm Ecuador
    - cron: '0 3 * * *'    # 10pm Ecuador
  workflow_dispatch:
    # Correr manualmente desde github.com o la app móvil de GitHub

jobs:
  job_hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🐍 Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔑 Reconstruct Gmail Credentials
      run: |
        mkdir -p data
        echo "${{ secrets.GMAIL_CREDENTIALS_B64 }}" | base64 -d > data/credentials.json
        echo "${{ secrets.GMAIL_TOKEN_B64 }}" | base64 -d > data/token.json
        echo "Credenciales Gmail restauradas OK"

    - name: 🚀 Run AI Job Hunter V5 (Empleos)
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
        LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
        LINKEDIN_JSESSIONID: ${{ secrets.LINKEDIN_JSESSIONID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "Iniciando ciclo de postulaciones..."
        python main_v3.py --send --max 20
        echo "Ciclo completado."

    - name: 🎓 Run Scholarship Hunter (Becas — 1x al dia a las 7am)
      if: github.event.schedule == '0 12 * * *' || github.event_name == 'workflow_dispatch'
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "Buscando becas internacionales..."
        python scholarship_hunter.py
        echo "Búsqueda de becas completada."

    - name: 📊 Commit y Push resultados
      run: |
        git config --global user.name "AI Job Hunter Bot 🤖"
        git config --global user.email "bot@job-hunter.ai"
        git add cover_letters/ reportes/ data/sent_log.json OPORTUNIDADES_HOY.md || true
        git commit -m "🎯 Ciclo Auto: $(date +'%Y-%m-%d %H:%M UTC') — $(python -c "import json; d=json.load(open('data/sent_log.json')); print(len(d.get('applications',[])), 'aplicaciones totales')" 2>/dev/null || echo 'nuevo ciclo')" || echo "Sin cambios nuevos"
        git push || echo "Push fallido, pero el bot corrio OK"
