name: 🤖 AI Job Hunter V5 — Remotive + RemoteOK + GetOnBoard

on:
  schedule:
    - cron: '0 12 * * *'   # 7am Ecuador (UTC-5)
    - cron: '0 22 * * *'   # 5pm Ecuador
  workflow_dispatch:        # Ejecucion manual desde GitHub

jobs:
  job_hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🐍 Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: |
        pip install --upgrade pip
        pip install requests beautifulsoup4 lxml python-dotenv

    - name: 📁 Prepare directories
      run: |
        mkdir -p data reportes

    - name: 🔍 Run Job Hunter V5
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        SMTP_HOST: smtp.office365.com
        SMTP_PORT: "587"
        SMTP_TLS: "true"
        MAX_APPLICATIONS: "8"
      run: python main_v5.py

    - name: 💾 Commit results
      run: |
        git config user.email "bot@github-actions.com"
        git config user.name "AI Job Hunter Bot"
        git add OPORTUNIDADES_HOY.md reportes/ data/ || true
        git diff --staged --quiet || git commit -m "🤖 [Bot] Reporte $(date +'%Y-%m-%d %H:%M') — Job Hunt V5"
        git push || true
